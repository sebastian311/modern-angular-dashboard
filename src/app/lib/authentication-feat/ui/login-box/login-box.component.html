<mat-card class="card" appearance="outlined">
    <mat-card-header>
        <mat-card-title>
            LOGIN
        </mat-card-title>
    </mat-card-header>
  
    <mat-form-field>
        <mat-label>Username</mat-label>
        <input matInput type="text">
    </mat-form-field>
    <mat-form-field>
        <mat-label>Password</mat-label>
        <input matInput type="password">
    </mat-form-field>

    <mat-card-actions class="buttons-container">
        <button matButton>Login</button>
        <button matButton disabled>Register</button>
        <sub>The register functionality is <strong>NOT</strong> yet implemented. Please use DEMO credentials `admin:admin` to access the application.</sub>
    </mat-card-actions>
</mat-card>
