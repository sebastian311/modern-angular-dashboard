@if(isLoading()) {
  <div class="overlay">
    <mat-spinner />
  </div>
}

@else {
    <mat-list class="mat-list">
        @for (city of cityList(); track city.id) {
            <mat-list-item>
                <button mat-list-item class="city-wrapper">{{ city.name }}</button>
            </mat-list-item>
        }
    </mat-list>
}
